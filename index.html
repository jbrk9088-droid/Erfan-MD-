<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>erfan - MD</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #000000; /* Black background */
      text-align: center;
      padding: 50px;
    }

    /* Stylish heading with border */
    h1 {
      font-size: 50px;
      color: #ffffff;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 40px;
      -webkit-text-stroke: 2px #FFD700; /* Gold border around text */
      text-shadow: 2px 2px 5px rgba(255, 215, 0, 0.5); /* subtle 3D glow */
    }

    img {
      width: 220px;
      height: 220px;
      border-radius: 20px;
      margin: 30px 0;
      box-shadow: 10px 10px 20px rgba(0,0,0,0.5), -5px -5px 15px rgba(255,255,255,0.2);
      transition: transform 0.3s;
    }

    img:hover {
      transform: rotateY(20deg) rotateX(10deg) scale(1.05);
    }

    .button {
      display: inline-block;
      padding: 18px 30px;
      margin: 15px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      border-radius: 15px;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.5), -5px -5px 15px rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      font-weight: bold;
      text-transform: uppercase;
    }

    .button:hover {
      transform: translateY(-5px);
      box-shadow: 8px 8px 20px rgba(0,0,0,0.6), -8px -8px 20px rgba(255,255,255,0.3);
    }

    .connect {
      background: #FFD700; /* Yellow connect button */
      color: #000; /* Black text on yellow */
    }

    .telegram {
      background: linear-gradient(145deg, #0088cc, #006699);
    }

    .whatsapp {
      background: linear-gradient(145deg, #25D366, #128C7E);
    }
  </style>
</head>
<body>

  <h1>Erfan MD</h1>

  <!-- 3D Image -->
  <img src="https://files.catbox.moe/427sq3.jpg" alt="erfan - MD Image">

  <!-- Connect Button -->
  <div>
    <a href="https://erfan-md.vercel.app/" class="button connect">Connect</a>
  </div>

  <!-- Telegram Channel Button -->
  <div>
    <a href="https://t.me/jb_papa71" class="button telegram">Telegram Channel</a>
  </div>

  <!-- WhatsApp Channel Button -->
  <div>
    <a href="https://whatsapp.com/channel/0029Vb69yTi5PO0rX16dFQ1L" class="button whatsapp">WhatsApp Channel</a>
  </div>

</body>
</html>
